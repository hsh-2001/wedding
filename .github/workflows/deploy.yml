name: Build and Deploy
on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: corepack enable
      - uses: actions/setup-node@v4
        with:
          node-version: 25
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Static Build
        run: npx nuxi generate
        env:
          NUXT_APP_BASE_URL: /hsh-2001/wedding 

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create CNAME file
        run: echo "hsh-2001.github.io" > .output/public/CNAME

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4

      - name: Show deployed domain
        run: |
          echo "Deployment complete!"
          echo "Your site is live at: https://hsh-2001.github.io/"
          echo "Or via your custom domain: https://hsh-2001.github.io/wedding/"
          if [ -f .output/public/CNAME ]; then
            echo "Custom domain set: $(cat .output/public/CNAME)"
          fi